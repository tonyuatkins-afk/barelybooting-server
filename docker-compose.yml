services:
  barelybooting:
    build: .
    image: barelybooting-server:0.1.3
    container_name: barelybooting
    restart: unless-stopped
    environment:
      BAREBOOT_DB: /data/barelybooting.sqlite
      BAREBOOT_PUBLIC_BASE: ${BAREBOOT_PUBLIC_BASE:-https://barelybooting.com}
      BAREBOOT_ENV: production
      PORT: 8080
    volumes:
      - barelybooting_data:/data
    expose:
      - "8080"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Resource ceilings: hard-cap blast radius on the co-tenant HA host.
    # Comfortable for the projected workload (POSTs are tiny, browse
    # pages read from SQLite); bump if you ever add heavy analytics.
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 128
    networks:
      # App container is ONLY on the internal network. A compromised
      # Flask process has no route to the internet, no route to the HA
      # LAN, nothing. It can still talk to cloudflared (which is on
      # both networks) and the Docker volume, which is the point.
      - app_internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/api/v1/health',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # Pin cloudflared to a known release. Bump periodically:
  # https://github.com/cloudflare/cloudflared/releases
  cloudflared:
    image: cloudflare/cloudflared:2024.12.2
    container_name: barelybooting-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      barelybooting:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 128m
    cpus: 0.25
    pids_limit: 64
    networks:
      # Bridges both networks. Reaches barelybooting:8080 on the
      # internal side, reaches Cloudflare's edge on the egress side.
      # If cloudflared is ever compromised, the blast radius is the
      # tunnel itself (which can be revoked from the Cloudflare
      # dashboard in seconds), not the LAN.
      - app_internal
      - edge_egress

volumes:
  barelybooting_data:

networks:
  # internal: true means no NAT, no route out. The app container has
  # no way to reach the HA LAN (10.69.69.0/24) or the open internet,
  # even if an RCE lets an attacker run arbitrary Python inside it.
  app_internal:
    internal: true
  # Standard bridge with outbound NAT. Only cloudflared sits here; it
  # needs this to reach Cloudflare's edge. This is the only Docker
  # network with a path off the host, and no untrusted code runs here.
  edge_egress:
