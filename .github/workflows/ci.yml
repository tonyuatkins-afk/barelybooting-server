name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-progress run when a new commit lands on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-lock.txt

      - name: Install deps from lock file
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt pytest

      - name: Run test suite
        run: pytest tests/ -q

  audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit pinned dependency tree
        # --strict fails the build on any vulnerability, including
        # transitive ones. --require-hashes is off because the lock file
        # is pip-freeze format (no hashes); that's a future hardening
        # when we move to pip-tools or uv.
        run: pip-audit --requirement requirements-lock.txt --strict
