<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}barelybooting{% endblock %} — CERBERUS results</title>
<style>
  :root {
    --bg:        #000;
    --fg:        #00ff41;   /* phosphor green */
    --fg-dim:    #008000;
    --fg-hot:    #ffff00;   /* amber highlight */
    --border:    #00ff41;
    --warn:      #ffcc00;
    --fail:      #ff4040;
    --pass:      #00ff80;
  }
  html, body {
    background: var(--bg);
    color: var(--fg);
    font-family: "Consolas", "Courier New", monospace;
    margin: 0;
    padding: 0;
    min-height: 100vh;
  }
  body {
    padding: 1.5rem 2rem;
    max-width: 900px;
    margin: 0 auto;
  }
  a { color: var(--fg-hot); text-decoration: underline; }
  a:hover { color: var(--fg); background: var(--fg-hot); color: #000; }
  h1, h2, h3 { color: var(--fg-hot); font-weight: normal; }
  h1 { font-size: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3rem; }
  h2 { font-size: 1.15rem; }
  header.site {
    border-bottom: 2px solid var(--border);
    margin-bottom: 1.5rem;
    padding-bottom: 0.5rem;
  }
  header.site .wordmark {
    color: var(--fg-hot);
    font-weight: bold;
    font-size: 1.25rem;
    letter-spacing: 0.1em;
  }
  header.site nav a { margin-right: 1.2rem; }
  table.submissions {
    border-collapse: collapse;
    width: 100%;
    margin: 1rem 0;
  }
  table.submissions th, table.submissions td {
    border: 1px solid var(--fg-dim);
    padding: 0.3rem 0.6rem;
    text-align: left;
    font-size: 0.9rem;
  }
  table.submissions th { color: var(--fg-hot); }
  table.submissions tr:hover td { background: #002a00; }
  pre {
    background: #0a0a0a;
    border: 1px solid var(--fg-dim);
    padding: 1rem;
    overflow-x: auto;
    color: var(--fg);
    font-size: 0.85rem;
    line-height: 1.3;
  }
  .kv { display: grid; grid-template-columns: 12rem 1fr; gap: 0.2rem 1rem; margin: 1rem 0; }
  .kv dt { color: var(--fg-dim); }
  .kv dd { margin: 0; color: var(--fg); }
  .badge {
    display: inline-block;
    padding: 0.1rem 0.4rem;
    border: 1px solid var(--fg-dim);
    font-size: 0.8rem;
    margin-right: 0.3rem;
  }
  .pager { margin-top: 1rem; }
  .pager a { margin-right: 1rem; }
  footer {
    margin-top: 3rem;
    padding-top: 1rem;
    border-top: 1px solid var(--fg-dim);
    color: var(--fg-dim);
    font-size: 0.8rem;
  }
</style>
</head>
<body>
<header class="site">
  <div class="wordmark">CERBERUS :: results browser</div>
  <nav>
    <a href="/cerberus/">all</a>
    <a href="/cerberus/cpu/486">486</a>
    <a href="/cerberus/cpu/386">386</a>
    <a href="/cerberus/cpu/286">286</a>
    <a href="/cerberus/cpu/8088">8088</a>
    <a href="/cerberus/unknown">unknown</a>
  </nav>
</header>

{% block content %}{% endblock %}

<footer>
  Submissions from the <a href="https://github.com/tonyuatkins-afk/CERBERUS">CERBERUS</a>
  DOS diagnostic tool. Data freely browsable, hosted at barelybooting.com.
</footer>
</body>
</html>
